<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CafeHub - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .register-card {
            max-width: 420px;
            margin: 60px auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            background: white;
        }
        .btn-primary { background-color: #ff6600; border-color: #ff6600; width: 100%; }
        .btn-primary:hover { background-color: #e65c00; }
        h2 { color: #ff6600; text-align: center; margin-bottom: 25px; }
        .strength-bar {
            height: 6px;
            border-radius: 3px;
            transition: all 0.3s;
            margin-top: 6px;
        }
        .strength-text { font-size: 12px; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="register-card">
        <h2>🍽️ Create Account - CafeHub</h2>
        <div id="message"></div>
        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" id="name" class="form-control" placeholder="Enter your full name">
        </div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" id="email" class="form-control" placeholder="Enter your email">
        </div>
        <div class="mb-3">
            <label class="form-label">Phone</label>
            <input type="text" id="phone" class="form-control" placeholder="Enter your phone number">
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" id="password" class="form-control" placeholder="Create a password" oninput="checkStrength()">
            <div class="strength-bar" id="strength-bar" style="background:#eee;"></div>
            <div class="strength-text" id="strength-text"></div>
            <ul class="mt-2 small text-muted" id="requirements">
                <li id="req-length">At least 8 characters</li>
                <li id="req-upper">At least one uppercase letter</li>
                <li id="req-lower">At least one lowercase letter</li>
                <li id="req-number">At least one number</li>
                <li id="req-special">At least one special character (!@#$%^&*)</li>
            </ul>
        </div>
        <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <input type="password" id="confirm-password" class="form-control" placeholder="Confirm your password" oninput="checkMatch()">
            <div class="small mt-1" id="match-text"></div>
        </div>
        <div class="mb-3">
            <label class="form-label">Register as</label>
            <select id="role" class="form-select">
                <option value="student">Student</option>
                <option value="staff">Staff</option>
                <option value="admin">Admin</option>
            </select>
        </div>
        <button class="btn btn-primary" onclick="register()">Register</button>
        <p class="text-center mt-3">Already have an account? <a href="/">Login</a></p>
    </div>

    <script>
        function checkStrength() {
            const password = document.getElementById('password').value;
            const bar = document.getElementById('strength-bar');
            const text = document.getElementById('strength-text');

            const hasLength = password.length >= 8;
            const hasUpper = /[A-Z]/.test(password);
            const hasLower = /[a-z]/.test(password);
            const hasNumber = /[0-9]/.test(password);
            const hasSpecial = /[!@#$%^&*(),.?":{}|<>]/.test(password);

            document.getElementById('req-length').style.color = hasLength ? 'green' : '#999';
            document.getElementById('req-upper').style.color = hasUpper ? 'green' : '#999';
            document.getElementById('req-lower').style.color = hasLower ? 'green' : '#999';
            document.getElementById('req-number').style.color = hasNumber ? 'green' : '#999';
            document.getElementById('req-special').style.color = hasSpecial ? 'green' : '#999';

            const score = [hasLength, hasUpper, hasLower, hasNumber, hasSpecial].filter(Boolean).length;

            if (score <= 2) {
                bar.style.background = '#dc3545';
                bar.style.width = '33%';
                text.textContent = '🔴 Weak password';
                text.style.color = '#dc3545';
            } else if (score <= 3) {
                bar.style.background = '#ffc107';
                bar.style.width = '66%';
                text.textContent = '🟡 Medium password';
                text.style.color = '#ffc107';
            } else {
                bar.style.background = '#198754';
                bar.style.width = '100%';
                text.textContent = '🟢 Strong password';
                text.style.color = '#198754';
            }
        }

        function checkMatch() {
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;
            const matchText = document.getElementById('match-text');

            if (confirm === '') {
                matchText.textContent = '';
            } else if (password === confirm) {
                matchText.textContent = '✅ Passwords match';
                matchText.style.color = 'green';
            } else {
                matchText.textContent = '❌ Passwords do not match';
                matchText.style.color = 'red';
            }
        }

        async function register() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;
            const role = document.getElementById('role').value;

            if (!name || !email || !password) {
                document.getElementById('message').innerHTML =
                    `<div class="alert alert-warning">Please fill in all required fields</div>`;
                return;
            }

            if (password !== confirm) {
                document.getElementById('message').innerHTML =
                    `<div class="alert alert-danger">Passwords do not match</div>`;
                return;
            }

            const hasLength = password.length >= 8;
            const hasUpper = /[A-Z]/.test(password);
            const hasLower = /[a-z]/.test(password);
            const hasNumber = /[0-9]/.test(password);
            const hasSpecial = /[!@#$%^&*(),.?":{}|<>]/.test(password);

            if (!hasLength || !hasUpper || !hasLower || !hasNumber || !hasSpecial) {
                document.getElementById('message').innerHTML =
                    `<div class="alert alert-danger">Password must be at least 8 characters and include uppercase, lowercase, number and special character</div>`;
                return;
            }

            const res = await fetch('/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password, phone, role })
            });

            const data = await res.json();
            if (res.ok) {
                document.getElementById('message').innerHTML =
                    `<div class="alert alert-success">${data.message}</div>`;
            } else {
                document.getElementById('message').innerHTML =
                    `<div class="alert alert-danger">${data.message}</div>`;
            }
        }
    </script>
</body>
</html>

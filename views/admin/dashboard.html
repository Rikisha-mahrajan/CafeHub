<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CafeHub - Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #6f42c1; }
        .nav-tabs .nav-link.active { background-color: #6f42c1; color: white; }
        .stat-card { background: white; border-radius: 10px; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .stat-number { font-size: 28px; font-weight: bold; color: #6f42c1; }
        .status-pending { background-color: #6c757d; }
        .status-accepted { background-color: #0d6efd; }
        .status-preparing { background-color: #fd7e14; }
        .status-ready { background-color: #198754; }
        .status-completed { background-color: #20c997; }
        .status-cancelled { background-color: #dc3545; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark px-4 py-3">
        <span class="navbar-brand fw-bold">🍽️ CafeHub Admin</span>
        <a href="/auth/logout" class="btn btn-outline-light">Logout</a>
    </nav>

    <div class="container mt-4">
        <div class="row g-3 mb-4" id="stats-container"></div>

        <ul class="nav nav-tabs mb-4">
            <li class="nav-item"><button class="nav-link active" onclick="showTab('users')" id="tab-users">Users</button></li>
            <li class="nav-item"><button class="nav-link" onclick="showTab('orders')" id="tab-orders">Order History</button></li>
            <li class="nav-item"><button class="nav-link" onclick="showTab('payments')" id="tab-payments">Payments</button></li>
            <li class="nav-item"><button class="nav-link" onclick="showTab('feedback')" id="tab-feedback">Feedback</button></li>
        </ul>

        <div id="users-tab"><div id="users-container"></div></div>
        <div id="orders-tab" style="display:none"><div id="orders-container"></div></div>
        <div id="payments-tab" style="display:none"><div id="payments-container"></div></div>
        <div id="feedback-tab" style="display:none"><div id="feedback-container"></div></div>
    </div>

    <script>
        async function loadStats() {
            const res = await fetch('/admin/stats');
            const stats = await res.json();
            document.getElementById('stats-container').innerHTML = `
                <div class="col-md-3"><div class="stat-card"><div class="stat-number">${stats.total_orders}</div><div>Total Orders</div></div></div>
                <div class="col-md-3"><div class="stat-card"><div class="stat-number">${stats.total_students}</div><div>Students</div></div></div>
                <div class="col-md-3"><div class="stat-card"><div class="stat-number">Rs. ${stats.total_revenue}</div><div>Revenue</div></div></div>
                <div class="col-md-3"><div class="stat-card"><div class="stat-number">${stats.total_feedback}</div><div>Feedback</div></div></div>
            `;
        }

        function showTab(tab) {
            ['users', 'orders', 'payments', 'feedback'].forEach(t => {
                document.getElementById(`${t}-tab`).style.display = t === tab ? 'block' : 'none';
                document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
            });
            if (tab === 'users') loadUsers();
            if (tab === 'orders') loadOrders();
            if (tab === 'payments') loadPayments();
            if (tab === 'feedback') loadFeedback();
        }

        async function loadUsers() {
            const res = await fetch('/admin/users');
            const users = await res.json();
            document.getElementById('users-container').innerHTML = `
                <table class="table table-bordered bg-white">
                    <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Role</th><th>Joined</th><th>Action</th></tr></thead>
                    <tbody>
                        ${users.map(u => `
                            <tr>
                                <td>${u.name}</td>
                                <td>${u.email}</td>
                                <td>${u.phone || '-'}</td>
                                <td>
                                    <select class="form-select form-select-sm" onchange="updateRole(${u.id}, this.value)">
                                        <option value="student" ${u.role === 'student' ? 'selected' : ''}>Student</option>
                                        <option value="staff" ${u.role === 'staff' ? 'selected' : ''}>Staff</option>
                                        <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>Admin</option>
                                    </select>
                                </td>
                                <td>${new Date(u.created_at).toLocaleDateString()}</td>
                                <td><button class="btn btn-sm btn-outline-danger" onclick="deleteUser(${u.id})">Delete</button></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>`;
        }

        async function updateRole(id, role) {
            await fetch(`/admin/users/${id}/role`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ role })
            });
        }

        async function deleteUser(id) {
            if (!confirm('Delete this user?')) return;
            await fetch(`/admin/users/${id}`, { method: 'DELETE' });
            loadUsers();
        }

        async function loadOrders() {
            const res = await fetch('/admin/orders');
            const orders = await res.json();
            document.getElementById('orders-container').innerHTML = `
                <table class="table table-bordered bg-white">
                    <thead><tr><th>Order ID</th><th>Customer</th><th>Total</th><th>Status</th><th>Payment</th><th>Date</th></tr></thead>
                    <tbody>
                        ${orders.map(o => `
                            <tr>
                                <td>#${o.id}</td>
                                <td>${o.customer_name}</td>
                                <td>Rs. ${o.total_amount}</td>
                                <td><span class="badge status-${o.status}">${o.status}</span></td>
                                <td>${o.payment_status}</td>
                                <td>${new Date(o.created_at).toLocaleString()}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>`;
        }

        async function loadPayments() {
            const res = await fetch('/admin/payments');
            const payments = await res.json();
            document.getElementById('payments-container').innerHTML = `
                <table class="table table-bordered bg-white">
                    <thead><tr><th>Transaction UUID</th><th>Customer</th><th>Amount</th><th>Status</th><th>Reference</th><th>Date</th></tr></thead>
                    <tbody>
                        ${payments.map(p => `
                            <tr>
                                <td>${p.transaction_uuid}</td>
                                <td>${p.customer_name}</td>
                                <td>Rs. ${p.amount}</td>
                                <td>${p.status}</td>
                                <td>${p.reference_id || '-'}</td>
                                <td>${new Date(p.created_at).toLocaleString()}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>`;
        }

        async function loadFeedback() {
            const res = await fetch('/admin/feedback');
            const feedbackList = await res.json();
            document.getElementById('feedback-container').innerHTML = feedbackList.map(f => `
                <div class="card mb-2">
                    <div class="card-body">
                        <strong>${f.customer_name}</strong> - ${'★'.repeat(f.rating)}${'☆'.repeat(5 - f.rating)}
                        <p class="mb-0 text-muted">${f.comment || 'No comment'}</p>
                        <small class="text-muted">${new Date(f.created_at).toLocaleString()}</small>
                    </div>
                </div>
            `).join('');
        }

        loadStats();
        loadUsers();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CafeHub - Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #ff6600; }
        .profile-card { max-width: 500px; margin: 40px auto; padding: 30px; border-radius: 10px; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #ff6600; border-color: #ff6600; width: 100%; }
        .btn-primary:hover { background-color: #e65c00; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark px-4 py-3">
        <span class="navbar-brand fw-bold">🍽️ CafeHub</span>
        <div>
            <a href="/views/menu.html" class="btn btn-outline-light me-2">Menu</a>
            <a href="/auth/logout" class="btn btn-outline-light">Logout</a>
        </div>
    </nav>

    <div class="profile-card">
        <h3 class="mb-4">My Profile</h3>
        <div id="message"></div>
        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" id="name" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">Email (cannot be changed)</label>
            <input type="email" id="email" class="form-control" disabled>
        </div>
        <div class="mb-3">
            <label class="form-label">Phone</label>
            <input type="text" id="phone" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">New Password (leave blank to keep current)</label>
            <input type="password" id="password" class="form-control" placeholder="Enter new password">
        </div>
        <button class="btn btn-primary" onclick="updateProfile()">Update Profile</button>
    </div>

    <script>
        async function loadProfile() {
            const res = await fetch('/auth/profile');
            const user = await res.json();
            document.getElementById('name').value = user.name;
            document.getElementById('email').value = user.email;
            document.getElementById('phone').value = user.phone || '';
        }

        async function updateProfile() {
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;

            const res = await fetch('/auth/profile', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, phone, password })
            });

            const data = await res.json();
            if (res.ok) {
                document.getElementById('message').innerHTML = `<div class="alert alert-success">${data.message}</div>`;
            } else {
                document.getElementById('message').innerHTML = `<div class="alert alert-danger">${data.message}</div>`;
            }
        }

        loadProfile();
    </script>
</body>
</html>
